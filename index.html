<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>Illia Rudyi</title>
    </head>
    <body>
        <div class="user-title">
            <h1>Illia Rudyi</h1>
            <button id="share-btn" onclick="shareOrCopy()">Share</button>
        </div>

        <h2>Software engineer, web dev active</h2>
        <h3>I love to play and watch basketball, and PC games</h3>

        <h2>Skills</h2>
        <ul>
            <li>JavaScript</li>
            <li>TypeScript</li>
            <li>React</li>
            <li>Node.js</li>
            <li>HTML/CSS</li>
            <li>Git</li>
        </ul>

        <h2>Links</h2>

        <ul>
            <li>
                <a href="https://github.com/iluhaar" target="_blank">GitHub</a>
            </li>
            <li>
                <a href="https://bsky.app/profile/illiadot.dev" target="_blank"
                    >Bluesky</a
                >
            </li>
            <li>
                <a
                    href="https://www.linkedin.com/in/illia-rudyi/"
                    target="_blank"
                    >LinkedIn</a
                >
            </li>
            <li><a href="mailto:contact@illiadot.dev">Email</a></li>
        </ul>

        <style>
            .user-title {
                display: flex;
                flex-direction: row;
                align-items: center;
                column-gap: 2rem;
            }
        </style>

        <script>
            async function shareOrCopy() {
                const url = location.href;
                const isMobile = /Mobi|Android/i.test(navigator.userAgent);
                if (isMobile && navigator.share) {
                    await navigator.share({ url });
                } else {
                    await navigator.clipboard.writeText(url);
                    const btn = document.getElementById("share-btn");
                    btn.textContent = "Copied!";
                    setTimeout(() => (btn.textContent = "Share"), 2000);
                }
            }
        </script>
    </body>
</html>
