<!doctype html>
<!-- Generated by npm run build:blog. Do not edit this file directly. -->
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>{{PAGE_TITLE}}</title>
        <meta name="description" content="{{DESCRIPTION}}" />
        <link rel="canonical" href="{{CANONICAL_URL}}" />
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&display=swap" />
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&display=swap" /></noscript>
        <script>
            (function () {
                function getCookie(name) {
                    var match = document.cookie.match(
                        new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
                    );
                    return match ? decodeURIComponent(match[1]) : null;
                }

                var saved = getCookie('theme') || localStorage.getItem('theme');
                if (saved === 'dark' || saved === 'light') {
                    document.documentElement.setAttribute('data-theme', saved);
                    return;
                }

                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            })();
        </script>
        <link rel="stylesheet" href="/styles.css" />
        <script defer src="https://assets.onedollarstats.com/stonks.js"></script>
    </head>
    <body>
        <div class="container">
            <header class="blog-site-header">
                <a class="blog-site-name" href="/">Illia Rudyi</a>
                <nav class="links" aria-label="Main navigation">
                    <a href="/blog/">Blog</a>
                    <a href="/projects/">Projects</a>
                    <button id="theme-btn" aria-label="Toggle theme" onclick="toggleTheme()"></button>
                </nav>
            </header>

            <main>
                <article class="blog-post">
                    <time class="blog-post-date" datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
{{POST_CONTENT}}
                </article>
            </main>
        </div>

        <script>
            function getCookie(name) {
                var match = document.cookie.match(
                    new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
                );
                return match ? decodeURIComponent(match[1]) : null;
            }

            function setThemeCookie(theme) {
                var cookie = 'theme=' + encodeURIComponent(theme) + '; path=/; max-age=31536000; samesite=lax';
                if (location.hostname === 'illiadot.dev' || location.hostname.endsWith('.illiadot.dev')) cookie += '; domain=.illiadot.dev';
                document.cookie = cookie;
            }

            function getEffectiveTheme() {
                var saved = getCookie('theme') || localStorage.getItem('theme');
                if (saved === 'dark' || saved === 'light') return saved;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                document.getElementById('theme-btn').textContent = theme === 'dark' ? '\u2600' : '\u263e';
            }

            function toggleTheme() {
                var next = getEffectiveTheme() === 'dark' ? 'light' : 'dark';
                setThemeCookie(next);
                localStorage.setItem('theme', next);
                applyTheme(next);
            }

            applyTheme(getEffectiveTheme());
            (window.requestIdleCallback || setTimeout)(function () {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (event) {
                    if (!getCookie('theme') && !localStorage.getItem('theme')) applyTheme(event.matches ? 'dark' : 'light');
                });
            });
        </script>
    </body>
</html>
